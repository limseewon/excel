<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엑셀 단축키 모음 | 업무별 엑셀 단축키 완벽 정리</title>
    <meta name="description" content="엑셀 단축키를 업무별로 정리했어요. 회계, 인사, 데이터분석, 일반 업무에서 자주 쓰는 단축키를 한눈에 확인하고 AI로 검색해보세요." />
    <meta name="keywords" content="엑셀 단축키, excel 단축키, 엑셀 단축키 모음, 엑셀 빠른 키, 엑셀 팁, 회계 엑셀, 인사 엑셀" />
    <meta name="author" content="Excel Shortcut" />
    <meta property="og:title" content="엑셀 단축키 모음 | 업무별 완벽 정리" />
    <meta property="og:description" content="회계, 인사, 데이터분석 등 업무별 엑셀 단축키를 한눈에. AI 검색으로 원하는 단축키를 바로 찾아보세요." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://limseewon.github.io/excel/" />
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #fff;
        --border: #e5e5e2;
        --border-hover: #d0d0cb;
        --text: #1a1a18;
        --text-muted: #888884;
        --text-hint: #b0b0aa;
        --accent: #3c3489;
        --accent-light: #eeedfe;
        --accent-text: #26215c;
        --key-bg: #f0f0ed;
        --key-border: #d8d8d4;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 1rem;
        height: 60px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 16px;
        color: var(--accent);
        white-space: nowrap;
        text-decoration: none;
      }
      .logo svg { width: 22px; height: 22px; }
      .search-wrap { flex: 1; max-width: 440px; position: relative; }
      .search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-hint);
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 9px 12px 9px 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      #search:focus { border-color: var(--accent); background: var(--surface); }
      #search::placeholder { color: var(--text-hint); }
      .header-btns { display: flex; gap: 8px; align-items: center; }
      .ai-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      .ai-btn:hover { opacity: 0.88; }
      .ai-btn svg { width: 15px; height: 15px; }
      .tool-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--surface);
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        transition: all 0.15s;
      }
      .tool-btn:hover { background: var(--accent-light); }
      main { max-width: 1100px; margin: 0 auto; padding: 2rem; }
      .job-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .job-tab {
        padding: 7px 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .job-tab:hover { border-color: var(--border-hover); color: var(--text); }
      .job-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
      .job-desc { font-size: 13px; color: var(--text-hint); margin-bottom: 1.25rem; }
      .cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
      .cat-btn {
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .cat-btn:hover { border-color: var(--border-hover); color: var(--text); }
      .cat-btn.active { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }
      .result-count { font-size: 13px; color: var(--text-hint); margin-bottom: 1rem; }
      .section { margin-bottom: 2rem; }
      .section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-hint);
        margin-bottom: 0.75rem;
      }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.15s;
        cursor: pointer;
      }
      .card:hover { border-color: var(--accent); background: var(--accent-light); }
      .card-left { flex: 1; min-width: 0; }
      .card-desc { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
      .card-tip { font-size: 12px; color: var(--text-hint); }
      .keys { display: flex; align-items: center; gap: 4px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
      .key {
        display: inline-flex;
        align-items: center;
        padding: 4px 9px;
        background: var(--key-bg);
        border: 1px solid var(--key-border);
        border-bottom-width: 2px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--text);
        white-space: nowrap;
      }
      .plus { font-size: 11px; color: var(--text-hint); }
      .empty { text-align: center; padding: 4rem 2rem; color: var(--text-hint); font-size: 14px; }
      .empty p:first-child { font-size: 18px; margin-bottom: 0.5rem; color: var(--text-muted); }

      /* AI 패널 */
      .ai-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 1.75rem;
        overflow: hidden;
        display: none;
      }
      .ai-panel.open { display: block; }
      .ai-panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--accent-light);
      }
      .ai-panel-header span { font-size: 14px; font-weight: 500; color: var(--accent-text); flex: 1; }
      .ai-close { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 0; font-family: inherit; }
      .ai-input-row { display: flex; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
      #ai-query {
        flex: 1;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        background: var(--bg);
      }
      #ai-query:focus { border-color: var(--accent); background: var(--surface); }
      .ai-ask-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: opacity 0.15s;
      }
      .ai-ask-btn:hover { opacity: 0.88; }
      .ai-ask-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .ai-answer { padding: 16px; font-size: 14px; line-height: 1.8; color: var(--text); min-height: 60px; white-space: pre-wrap; }
      .typing-dots span { display: inline-block; animation: blink 1.2s infinite; font-size: 20px; }
      .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
      .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

      /* 단축키 카드 모달 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open { opacity: 1; pointer-events: auto; }
      .modal {
        background: var(--surface);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 520px;
        max-height: 90vh;
        overflow-y: auto;
        border: 1px solid var(--border);
      }
      .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 20px 0; }
      .modal-title { font-size: 17px; font-weight: 600; color: var(--text); }
      .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text-muted); line-height: 1; padding: 0; flex-shrink: 0; }
      .modal-keys { display: flex; align-items: center; gap: 4px; padding: 14px 20px; flex-wrap: wrap; }
      .modal-body { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 16px; }
      .modal-section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 6px; }
      .modal-section-content { font-size: 14px; color: var(--text); line-height: 1.7; }
      .modal-steps { list-style: none; display: flex; flex-direction: column; gap: 6px; }
      .modal-steps li { display: flex; gap: 10px; font-size: 14px; color: var(--text); }
      .modal-steps li .step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent-light); color: var(--accent-text); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 1px; }
      .modal-example { background: var(--bg); border-radius: var(--radius-md); padding: 12px 14px; font-size: 13px; color: var(--text-muted); line-height: 1.6; border-left: 3px solid var(--accent); }

      /* AI 툴 모달 공통 */
      .tool-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .tool-overlay.open { opacity: 1; pointer-events: auto; }
      .tool-modal {
        background: var(--surface);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 600px;
        max-height: 88vh;
        overflow-y: auto;
        border: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .tool-modal-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--accent-light);
        position: sticky;
        top: 0;
      }
      .tool-modal-header .tool-icon { font-size: 20px; }
      .tool-modal-header h2 { font-size: 16px; font-weight: 600; color: var(--accent-text); flex: 1; }
      .tool-modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text-muted); line-height: 1; padding: 0; }
      .tool-modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; flex: 1; }
      .tool-modal-body label { font-size: 13px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 6px; }
      .tool-modal-body textarea, .tool-modal-body input[type="text"] {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        background: var(--bg);
        outline: none;
        resize: vertical;
        transition: border-color 0.15s;
      }
      .tool-modal-body textarea:focus, .tool-modal-body input[type="text"]:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      .tool-submit-btn {
        padding: 10px 20px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: opacity 0.15s;
        align-self: flex-start;
      }
      .tool-submit-btn:hover { opacity: 0.88; }
      .tool-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .tool-result {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 14px 16px;
        font-size: 14px;
        line-height: 1.8;
        color: var(--text);
        white-space: pre-wrap;
        display: none;
      }
      .tool-result.show { display: block; }
      .tool-result-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .tool-result-header span { font-size: 12px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.05em; }
      .copy-btn {
        padding: 5px 12px;
        background: var(--accent-light);
        color: var(--accent-text);
        border: 1px solid var(--accent);
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .copy-btn:hover { background: var(--accent); color: #fff; }
      .tool-result-content { font-size: 14px; line-height: 1.8; }
      .formula-box {
        font-family: "SF Mono", "Fira Code", monospace;
        background: #1a1a2e;
        color: #a8dadc;
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 14px;
        margin-bottom: 12px;
        word-break: break-all;
      }

      /* 퀴즈 전용 */
      .quiz-question {
        background: var(--accent-light);
        border-left: 4px solid var(--accent);
        border-radius: var(--radius-md);
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 500;
        color: var(--accent-text);
        line-height: 1.6;
      }
      .quiz-input-row { display: flex; gap: 8px; }
      .quiz-input-row input {
        flex: 1;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        outline: none;
        background: var(--bg);
      }
      .quiz-input-row input:focus { border-color: var(--accent); background: var(--surface); }
      .quiz-feedback {
        padding: 12px 16px;
        border-radius: var(--radius-md);
        font-size: 14px;
        display: none;
      }
      .quiz-feedback.show { display: block; }
      .quiz-feedback.correct { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
      .quiz-feedback.wrong { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
      .quiz-score { font-size: 13px; color: var(--text-muted); text-align: right; }
      .quiz-next-btn {
        padding: 9px 18px;
        background: var(--surface);
        color: var(--accent);
        border: 1px solid var(--accent);
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .quiz-next-btn:hover { background: var(--accent-light); }

      footer { text-align: center; padding: 2rem; font-size: 13px; color: var(--text-hint); border-top: 1px solid var(--border); margin-top: 2rem; }

      @media (max-width: 640px) {
        header { padding: 0 1rem; }
        main { padding: 1.25rem 1rem; }
        .logo span { display: none; }
        .grid { grid-template-columns: 1fr; }
        .header-btns { gap: 4px; }
        .tool-btn span { display: none; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="#">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          <span>엑셀 단축키</span>
        </a>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input id="search" type="text" placeholder="단축키 검색... (예: 복사, 저장, 합계)" />
        </div>
        <div class="header-btns">
          <button class="tool-btn" id="btn-formula">🔢 <span>수식 생성기</span></button>
          <button class="tool-btn" id="btn-error">🚨 <span>에러 해결사</span></button>
          <button class="tool-btn" id="btn-quiz">🎯 <span>단축키 퀴즈</span></button>
          <button class="tool-btn" id="btn-auto">⚡ <span>자동화 조언</span></button>
          <button class="ai-btn" id="ai-toggle-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
            </svg>
            AI 검색
          </button>
        </div>
      </div>
    </header>

    <main>
      <div class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3C3489" stroke-width="2">
            <path d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
          </svg>
          <span>하고 싶은 작업을 말해주세요 — 단축키를 찾아드릴게요</span>
          <button class="ai-close" id="ai-close">×</button>
        </div>
        <div class="ai-input-row">
          <input id="ai-query" type="text" placeholder="예: 여러 셀 내용을 한 줄로 합치고 싶어요" />
          <button class="ai-ask-btn" id="ai-ask">찾아보기</button>
        </div>
        <div class="ai-answer" id="ai-answer"></div>
      </div>

      <div class="job-tabs" id="job-tabs"></div>
      <div class="job-desc" id="job-desc"></div>
      <div class="cats" id="cats"></div>
      <div class="result-count" id="count"></div>
      <div id="list"></div>
    </main>

    <footer>
      <p>엑셀 단축키 모음 · Windows 기준 · 카드를 클릭하면 사용법을 볼 수 있어요</p>
    </footer>

    <!-- 단축키 카드 모달 -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div class="modal-title" id="modal-title"></div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="modal-keys" id="modal-keys"></div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <!-- 수식 생성기 모달 -->
    <div class="tool-overlay" id="overlay-formula">
      <div class="tool-modal">
        <div class="tool-modal-header">

        { cat:"시트·파일", desc:"인쇄", tip:"", keys:[["Ctrl"],["P"]], jobs:["전체","일반","회계","인사","기획"], when:"작업한 파일을 인쇄하거나 PDF로 내보낼 때 써요.", steps:["Ctrl + P를 눌러요","인쇄 설정 화면이 열려요","설정 후 인쇄"], example:"보고서 인쇄 전 Ctrl+P로 미리보기 확인 후 인쇄해요." },
        { cat:"데이터", desc:"필터 켜기/끄기", tip:"자동 필터 토글", keys:[["Ctrl"],["Shift"],["L"]], jobs:["전체","데이터분석","회계","인사"], when:"특정 조건에 맞는 데이터만 보고 싶을 때 써요.", steps:["데이터 표 안 아무 셀이나 클릭해요","Ctrl + Shift + L을 눌러요","열 헤더에 ▼ 버튼이 생겨요","▼ 클릭해서 원하는 조건 선택"], example:'직원 명단에서 "영업팀"만 보고 싶을 때 부서 열 ▼ → 영업팀 체크 → 확인.' },
        { cat:"데이터", desc:"피벗 테이블 새로고침", tip:"", keys:[["Alt"],["F5"]], jobs:["전체","데이터분석","회계"], when:"원본 데이터가 변경됐을 때 피벗 테이블을 최신 데이터로 업데이트할 때 써요.", steps:["피벗 테이블 안 아무 셀이나 클릭해요","Alt + F5를 눌러요","피벗이 최신 데이터로 갱신돼요"], example:"원본 데이터에 새 행을 추가한 후 Alt+F5 누르면 피벗 테이블에 반영돼요." },
        { cat:"데이터", desc:"정렬 오름차순", tip:"", keys:[["Alt"],["A"],["S"],["A"]], jobs:["전체","데이터분석","인사","회계"], when:"데이터를 가나다순, 숫자 작은 순으로 정렬할 때 써요.", steps:["정렬 기준이 될 열의 아무 셀이나 클릭해요","Alt → A → S → A 순서로 눌러요"], example:"이름 열 클릭 후 Alt+A+S+A 누르면 가나다순으로 정렬돼요." },
        { cat:"데이터", desc:"정렬 내림차순", tip:"", keys:[["Alt"],["A"],["S"],["D"]], jobs:["전체","데이터분석","인사","회계"], when:"데이터를 역순으로 정렬할 때 써요.", steps:["정렬 기준이 될 열의 아무 셀이나 클릭해요","Alt → A → S → D 순서로 눌러요"], example:"매출 열 클릭 후 Alt+A+S+D 누르면 매출이 높은 순으로 정렬돼요." },
      ];

      const JOBS = [
        { id:"전체", label:"전체", desc:"모든 단축키 목록이에요." },
        { id:"일반", label:"일반 업무", desc:"문서 작성, 데이터 입력 등 일상 업무에서 자주 쓰는 단축키예요." },
        { id:"회계", label:"회계·재무", desc:"숫자 서식, 합계, 통화 표시 등 회계 업무에 유용한 단축키예요." },
        { id:"인사", label:"인사·총무", desc:"명단 관리, 날짜 입력, 필터 등 인사 업무에 자주 쓰는 단축키예요." },
        { id:"데이터분석", label:"데이터 분석", desc:"필터, 정렬, 피벗, 수식 등 데이터 분석에 필수 단축키예요." },
        { id:"기획", label:"기획·보고서", desc:"서식, 인쇄, 문서 정리 등 보고서 작성에 유용한 단축키예요." },
      ];

      let activeJob = "전체", activeCat = "전체", query = "";

      function getFiltered() {
        const q = query.trim().toLowerCase();
        return ALL.filter(s => {
          const jobOk = s.jobs.includes(activeJob);
          const catOk = activeCat === "전체" || s.cat === activeCat;
          const qOk = !q || s.desc.toLowerCase().includes(q) || s.tip.toLowerCase().includes(q) || s.keys.flat().join("").toLowerCase().includes(q) || s.cat.toLowerCase().includes(q);
          return jobOk && catOk && qOk;
        });
      }

      function renderKeys(keys) {
        return keys.map((k,i) => `${i>0?'<span class="plus">+</span>':''}<span class="key">${k[0]}</span>`).join("");
      }

      function renderJobTabs() {
        const el = document.getElementById("job-tabs");
        el.innerHTML = JOBS.map(j => `<button class="job-tab${j.id===activeJob?" active":""}" data-job="${j.id}">${j.label}</button>`).join("");
        el.querySelectorAll(".job-tab").forEach(btn => {
          btn.addEventListener("click", () => { activeJob = btn.dataset.job; activeCat = "전체"; renderJobTabs(); renderCats(); render(); });
        });
        document.getElementById("job-desc").textContent = JOBS.find(j=>j.id===activeJob)?.desc||"";
      }

      function renderCats() {
        const cats = ["전체", ...new Set(ALL.filter(s=>s.jobs.includes(activeJob)).map(s=>s.cat))];
        const el = document.getElementById("cats");
        el.innerHTML = cats.map(c => `<button class="cat-btn${c===activeCat?" active":""}" data-cat="${c}">${c}</button>`).join("");
        el.querySelectorAll(".cat-btn").forEach(btn => {
          btn.addEventListener("click", () => { activeCat = btn.dataset.cat; renderCats(); render(); });
        });
      }

      function render() {
        const data = getFiltered();
        document.getElementById("count").textContent = `총 ${data.length}개`;
        const grouped = {};
        data.forEach(s => { if(!grouped[s.cat]) grouped[s.cat]=[]; grouped[s.cat].push(s); });
        const list = document.getElementById("list");
        if(!data.length) {
          list.innerHTML = `<div class="empty"><p>검색 결과 없음</p><p>"${query}"에 맞는 단축키를 찾지 못했어요. AI 검색을 써보세요!</p></div>`;
          return;
        }
        list.innerHTML = Object.entries(grouped).map(([cat,items]) => `
          <div class="section">
            <div class="section-label">${cat}</div>
            <div class="grid">
              ${items.map(s => `
                <div class="card" data-idx="${ALL.indexOf(s)}">
                  <div class="card-left">
                    <div class="card-desc">${s.desc}</div>
                    ${s.tip?`<div class="card-tip">${s.tip}</div>`:""}
                  </div>
                  <div class="keys">${renderKeys(s.keys)}</div>
                </div>
              `).join("")}
            </div>
          </div>
        `).join("");
        document.querySelectorAll(".card").forEach(card => {
          card.addEventListener("click", () => openModal(parseInt(card.dataset.idx)));
        });
      }

      // 단축키 카드 모달
      const overlay = document.getElementById("modal-overlay");
      function openModal(idx) {
        const s = ALL[idx];
        document.getElementById("modal-title").textContent = s.desc;
        document.getElementById("modal-keys").innerHTML = renderKeys(s.keys);
        document.getElementById("modal-body").innerHTML = `
          <div><div class="modal-section-title">언제 써요?</div><div class="modal-section-content">${s.when}</div></div>
          <div><div class="modal-section-title">사용 순서</div><ol class="modal-steps">${s.steps.map((st,i)=>`<li><span class="step-num">${i+1}</span><span>${st}</span></li>`).join("")}</ol></div>
          <div class="modal-example">💡 ${s.example}</div>
        `;
        overlay.classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeModal() { overlay.classList.remove("open"); document.body.style.overflow = ""; }
      document.getElementById("modal-close").addEventListener("click", closeModal);
      overlay.addEventListener("click", e => { if(e.target===overlay) closeModal(); });

      document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });

      // AI 단축키 검색 패널
      const aiPanel = document.getElementById("ai-panel");
      const aiAnswer = document.getElementById("ai-answer");
      const aiQuery = document.getElementById("ai-query");
      const aiAsk = document.getElementById("ai-ask");
      document.getElementById("ai-toggle-btn").addEventListener("click", () => {
        aiPanel.classList.toggle("open");
        if(aiPanel.classList.contains("open")) aiQuery.focus();
      });
      document.getElementById("ai-close").addEventListener("click", () => aiPanel.classList.remove("open"));

      async function askAI() {
        const q = aiQuery.value.trim();
        if(!q) return;
        aiAsk.disabled = true;
        aiAnswer.innerHTML = '<div class="typing-dots"><span>•</span><span>•</span><span>•</span></div>';
        try {
          const text = await callGroq(
            "당신은 엑셀 단축키 전문가입니다. 사용자가 하고 싶은 작업을 말하면 관련 엑셀 단축키를 알려주세요.\n- 핵심 단축키를 **Ctrl + C** 형식으로 강조\n- 사용법을 1~2줄로 간결하게 설명\n- 연관 단축키가 있으면 추가 소개\n- 친근하고 간결한 한국어로 답변\n- Windows 기준으로 답변",
            q
          );
          aiAnswer.innerHTML = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
        } catch(e) {
          aiAnswer.textContent = "오류가 발생했어요. 잠시 후 다시 시도해주세요.";
        }
        aiAsk.disabled = false;
      }
      aiAsk.addEventListener("click", askAI);
      aiQuery.addEventListener("keydown", e => { if(e.key==="Enter") askAI(); });

      // 툴 모달 공통 열기/닫기
      function openTool(id) {
        document.getElementById(id).classList.add("open");
        document.body.style.overflow = "hidden";
      }
      function closeTool(id) {
        document.getElementById(id).classList.remove("open");
        document.body.style.overflow = "";
      }
      document.querySelectorAll(".tool-modal-close").forEach(btn => {
        btn.addEventListener("click", () => closeTool(btn.dataset.target));
      });
      document.querySelectorAll(".tool-overlay").forEach(ov => {
        ov.addEventListener("click", e => { if(e.target===ov) closeTool(ov.id); });
      });
      document.addEventListener("keydown", e => {
        if(e.key==="Escape") {
          closeModal();
          document.querySelectorAll(".tool-overlay.open").forEach(ov => closeTool(ov.id));
        }
      });

      // 수식 생성기
      document.getElementById("btn-formula").addEventListener("click", () => openTool("overlay-formula"));
      document.getElementById("formula-submit").addEventListener("click", async () => {
        const q = document.getElementById("formula-input").value.trim();
        if(!q) return;
        const btn = document.getElementById("formula-submit");
        btn.disabled = true;
        btn.textContent = "생성 중...";
        const resultEl = document.getElementById("formula-result");
        const contentEl = document.getElementById("formula-content");
        resultEl.classList.remove("show");
        try {
          const text = await callGroq(
            "당신은 엑셀 수식 전문가입니다. 사용자의 요구사항에 맞는 엑셀 수식을 만들어주세요.\n응답 형식:\n1. 수식: (수식만 코드 형태로)\n2. 설명: (수식이 하는 일을 1~2줄로)\n3. 사용 예시: (구체적인 예시)\n- 친근하고 간결한 한국어로 답변\n- Windows/Excel 기준",
            q
          );
          contentEl.innerHTML = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
          resultEl.classList.add("show");
        } catch(e) {
          contentEl.textContent = "오류가 발생했어요.";
          resultEl.classList.add("show");
        }
        btn.disabled = false;
        btn.textContent = "수식 만들기";
      });
      document.getElementById("formula-copy").addEventListener("click", () => {
        const text = document.getElementById("formula-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("formula-copy");
          btn.textContent = "복사됨!";
          setTimeout(() => btn.textContent = "복사", 1500);
        });
      });

      // 에러 해결사
      document.getElementById("btn-error").addEventListener("click", () => openTool("overlay-error"));
      document.getElementById("error-submit").addEventListener("click", async () => {
        const errType = document.getElementById("error-input").value.trim();
        const ctx = document.getElementById("error-context").value.trim();
        if(!errType) return;
        const btn = document.getElementById("error-submit");
        btn.disabled = true;
        btn.textContent = "분석 중...";
        const resultEl = document.getElementById("error-result");
        const contentEl = document.getElementById("error-content");
        resultEl.classList.remove("show");
        try {
          const text = await callGroq(
            "당신은 엑셀 에러 해결 전문가입니다. 사용자가 겪는 엑셀 에러의 원인과 해결 방법을 알려주세요.\n응답 형식:\n1. 에러 원인: (왜 이 에러가 나는지)\n2. 해결 방법: (단계별로)\n3. 예방 팁: (같은 에러 안 나게 하는 방법)\n- 친근하고 간결한 한국어로 답변",
            `에러: ${errType}${ctx ? `\n상황: ${ctx}` : ""}`
          );
          contentEl.innerHTML = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
          resultEl.classList.add("show");
        } catch(e) {
          contentEl.textContent = "오류가 발생했어요.";
          resultEl.classList.add("show");
        }
        btn.disabled = false;
        btn.textContent = "원인 찾기";
      });
      document.getElementById("error-copy").addEventListener("click", () => {
        const text = document.getElementById("error-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("error-copy");
          btn.textContent = "복사됨!";
          setTimeout(() => btn.textContent = "복사", 1500);
        });
      });

      // 업무 자동화 조언
      document.getElementById("btn-auto").addEventListener("click", () => openTool("overlay-auto"));
      document.getElementById("auto-submit").addEventListener("click", async () => {
        const q = document.getElementById("auto-input").value.trim();
        if(!q) return;
        const btn = document.getElementById("auto-submit");
        btn.disabled = true;
        btn.textContent = "분석 중...";
        const resultEl = document.getElementById("auto-result");
        const contentEl = document.getElementById("auto-content");
        resultEl.classList.remove("show");
        try {
          const text = await callGroq(
            "당신은 엑셀 업무 자동화 전문가입니다. 사용자의 반복 업무를 더 효율적으로 할 수 있는 방법을 알려주세요.\n응답 형식:\n1. 핵심 단축키/기능: (바로 쓸 수 있는 것)\n2. 자동화 방법: (매크로, 수식 등)\n3. 예상 시간 절약: (어느 정도 빨라지는지)\n- 친근하고 실용적인 한국어로 답변\n- 초보자도 이해할 수 있게 설명",
            q
          );
          contentEl.innerHTML = text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>");
          resultEl.classList.add("show");
        } catch(e) {
          contentEl.textContent = "오류가 발생했어요.";
          resultEl.classList.add("show");
        }
        btn.disabled = false;
        btn.textContent = "조언 받기";
      });
      document.getElementById("auto-copy").addEventListener("click", () => {
        const text = document.getElementById("auto-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("auto-copy");
          btn.textContent = "복사됨!";
          setTimeout(() => btn.textContent = "복사", 1500);
        });
      });

      // 단축키 퀴즈
      document.getElementById("btn-quiz").addEventListener("click", () => openTool("overlay-quiz"));

      let quizList = [];
      let quizIdx = 0;
      let quizScore = 0;
      let quizTotal = 0;
      let quizAnswered = false;

      function getQuizItems() {
        return ALL.filter(s => s.keys.length >= 1 && s.keys[0][0] !== "↑↓←→" && s.keys[0][0] !== "클릭");
      }

      function shuffle(arr) {
        const a = [...arr];
        for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
        return a;
      }

      function formatAnswer(keys) {
        return keys.map(k=>k[0]).join(" + ");
      }

      function startQuiz() {
        quizList = shuffle(getQuizItems());
        quizIdx = 0;
        quizScore = 0;
        quizTotal = 0;
        quizAnswered = false;
        document.getElementById("quiz-next").style.display = "none";
        document.getElementById("quiz-start").textContent = "다시 시작";
        document.getElementById("quiz-answer").disabled = false;
        document.getElementById("quiz-submit").disabled = false;
        showQuiz();
      }

      function showQuiz() {
        if(quizIdx >= quizList.length) {
          document.getElementById("quiz-question").textContent = `🎉 퀴즈 완료! 최종 점수: ${quizScore} / ${quizTotal}`;
          document.getElementById("quiz-answer").disabled = true;
          document.getElementById("quiz-submit").disabled = true;
          document.getElementById("quiz-next").style.display = "none";
          document.getElementById("quiz-feedback").classList.remove("show");
          return;
        }
        const item = quizList[quizIdx];
        document.getElementById("quiz-question").textContent = `💬 "${item.desc}"을(를) 하려면 어떤 단축키를 눌러요?${item.tip ? ` (힌트: ${item.tip})` : ""}`;
        document.getElementById("quiz-answer").value = "";
        document.getElementById("quiz-answer").disabled = false;
        document.getElementById("quiz-submit").disabled = false;
        document.getElementById("quiz-feedback").classList.remove("show");
        document.getElementById("quiz-next").style.display = "none";
        document.getElementById("quiz-score").textContent = `${quizScore} / ${quizTotal}`;
        quizAnswered = false;
        document.getElementById("quiz-answer").focus();
      }

      function checkQuiz() {
        if(quizAnswered) return;
        const item = quizList[quizIdx];
        const userAns = document.getElementById("quiz-answer").value.trim().toLowerCase().replace(/\s/g,"");
        const correct = formatAnswer(item.keys).toLowerCase().replace(/\s/g,"");
        quizTotal++;
        quizAnswered = true;
        const fb = document.getElementById("quiz-feedback");
        if(userAns === correct || userAns === correct.replace(/\+/g,"")) {
          quizScore++;
          fb.className = "quiz-feedback show correct";
          fb.textContent = `✅ 정답! ${formatAnswer(item.keys)}`;
        } else {
          fb.className = "quiz-feedback show wrong";
          fb.textContent = `❌ 아쉬워요! 정답은 ${formatAnswer(item.keys)} 예요.`;
        }
        document.getElementById("quiz-score").textContent = `${quizScore} / ${quizTotal}`;
        document.getElementById("quiz-answer").disabled = true;
        document.getElementById("quiz-submit").disabled = true;
        document.getElementById("quiz-next").style.display = "inline-block";
        quizIdx++;
      }

      document.getElementById("quiz-start").addEventListener("click", startQuiz);
      document.getElementById("quiz-submit").addEventListener("click", checkQuiz);
      document.getElementById("quiz-answer").addEventListener("keydown", e => { if(e.key==="Enter") checkQuiz(); });
      document.getElementById("quiz-next").addEventListener("click", showQuiz);

      renderJobTabs();
      renderCats();
      render();
    </script>
  </body>
</html>
