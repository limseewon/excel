<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엑셀 단축키 모음 | 업무별 엑셀 단축키 완벽 정리</title>
    <meta
      name="description"
      content="엑셀 단축키를 업무별로 정리했어요. 회계, 인사, 데이터분석, 일반 업무에서 자주 쓰는 단축키를 한눈에 확인하고 AI로 검색해보세요." />
    <meta
      name="keywords"
      content="엑셀 단축키, excel 단축키, 엑셀 단축키 모음, 엑셀 빠른 키, 엑셀 팁, 회계 엑셀, 인사 엑셀" />
    <meta name="author" content="Excel Shortcut" />
    <meta property="og:title" content="엑셀 단축키 모음 | 업무별 완벽 정리" />
    <meta
      property="og:description"
      content="회계, 인사, 데이터분석 등 업무별 엑셀 단축키를 한눈에. AI 검색으로 원하는 단축키를 바로 찾아보세요." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://limseewon.github.io/excel/" />
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #fff;
        --border: #e5e5e2;
        --border-hover: #d0d0cb;
        --text: #1a1a18;
        --text-muted: #888884;
        --text-hint: #b0b0aa;
        --accent: #3c3489;
        --accent-light: #eeedfe;
        --accent-text: #26215c;
        --key-bg: #f0f0ed;
        --key-border: #d8d8d4;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 1rem;
        height: 60px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 16px;
        color: var(--accent);
        white-space: nowrap;
        text-decoration: none;
      }
      .logo svg {
        width: 22px;
        height: 22px;
      }
      .search-wrap {
        flex: 1;
        max-width: 440px;
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-hint);
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 9px 12px 9px 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      #search:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      #search::placeholder {
        color: var(--text-hint);
      }
      .ai-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      .ai-btn:hover {
        opacity: 0.88;
      }
      .ai-btn svg {
        width: 15px;
        height: 15px;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem;
      }
      .job-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .job-tab {
        padding: 7px 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .job-tab:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .job-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .job-desc {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 1.25rem;
      }
      .cats {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      .cat-btn {
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .cat-btn:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .cat-btn.active {
        background: var(--accent-light);
        color: var(--accent-text);
        border-color: var(--accent);
      }
      .result-count {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 1rem;
      }
      .section {
        margin-bottom: 2rem;
      }
      .section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-hint);
        margin-bottom: 0.75rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 10px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.15s;
        cursor: pointer;
      }
      .card:hover {
        border-color: var(--accent);
        background: var(--accent-light);
      }
      .card-left {
        flex: 1;
        min-width: 0;
      }
      .card-desc {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 3px;
      }
      .card-tip {
        font-size: 12px;
        color: var(--text-hint);
      }
      .keys {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .key {
        display: inline-flex;
        align-items: center;
        padding: 4px 9px;
        background: var(--key-bg);
        border: 1px solid var(--key-border);
        border-bottom-width: 2px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--text);
        white-space: nowrap;
      }
      .plus {
        font-size: 11px;
        color: var(--text-hint);
      }
      .empty {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-hint);
        font-size: 14px;
      }
      .empty p:first-child {
        font-size: 18px;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
      }
      /* AI 패널 */
      .ai-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 1.75rem;
        overflow: hidden;
        display: none;
      }
      .ai-panel.open {
        display: block;
      }
      .ai-panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--accent-light);
      }
      .ai-panel-header span {
        font-size: 14px;
        font-weight: 500;
        color: var(--accent-text);
        flex: 1;
      }
      .ai-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 20px;
        line-height: 1;
        padding: 0;
        font-family: inherit;
      }
      .ai-input-row {
        display: flex;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      #ai-query {
        flex: 1;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        background: var(--bg);
      }
      #ai-query:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      .ai-ask-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: opacity 0.15s;
      }
      .ai-ask-btn:hover {
        opacity: 0.88;
      }
      .ai-ask-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ai-answer {
        padding: 16px;
        font-size: 14px;
        line-height: 1.8;
        color: var(--text);
        min-height: 60px;
        white-space: pre-wrap;
      }
      .typing-dots span {
        display: inline-block;
        animation: blink 1.2s infinite;
        font-size: 20px;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }
      /* 모달 */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .modal {
        background: var(--surface);
        border-radius: var(--radius-lg);
        width: 100%;
        max-width: 520px;
        max-height: 90vh;
        overflow-y: auto;
        border: 1px solid var(--border);
      }
      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 20px 0;
      }
      .modal-title {
        font-size: 17px;
        font-weight: 600;
        color: var(--text);
      }
      .modal-close {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 22px;
        color: var(--text-muted);
        line-height: 1;
        padding: 0;
        flex-shrink: 0;
      }
      .modal-keys {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 14px 20px;
        flex-wrap: wrap;
      }
      .modal-body {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .modal-section-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-hint);
        margin-bottom: 6px;
      }
      .modal-section-content {
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
      }
      .modal-steps {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .modal-steps li {
        display: flex;
        gap: 10px;
        font-size: 14px;
        color: var(--text);
      }
      .modal-steps li .step-num {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--accent-light);
        color: var(--accent-text);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .modal-example {
        background: var(--bg);
        border-radius: var(--radius-md);
        padding: 12px 14px;
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.6;
        border-left: 3px solid var(--accent);
      }
      footer {
        text-align: center;
        padding: 2rem;
        font-size: 13px;
        color: var(--text-hint);
        border-top: 1px solid var(--border);
        margin-top: 2rem;
      }
      @media (max-width: 640px) {
        header {
          padding: 0 1rem;
        }
        main {
          padding: 1.25rem 1rem;
        }
        .logo span {
          display: none;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="#">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
          <span>엑셀 단축키</span>
        </a>
        <div class="search-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            id="search"
            type="text"
            placeholder="단축키 검색... (예: 복사, 저장, 합계)" />
        </div>
        <button class="ai-btn" id="ai-toggle-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <path
              d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
          AI 검색
        </button>
      </div>
    </header>

    <main>
      <div class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#3C3489"
            stroke-width="2">
            <path
              d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
          <span>하고 싶은 작업을 말해주세요 — 단축키를 찾아드릴게요</span>
          <button class="ai-close" id="ai-close">×</button>
        </div>
        <div class="ai-input-row">
          <input
            id="ai-query"
            type="text"
            placeholder="예: 여러 셀 내용을 한 줄로 합치고 싶어요" />
          <button class="ai-ask-btn" id="ai-ask">찾아보기</button>
        </div>
        <div class="ai-answer" id="ai-answer"></div>
      </div>

      <div class="job-tabs" id="job-tabs"></div>
      <div class="job-desc" id="job-desc"></div>
      <div class="cats" id="cats"></div>
      <div class="result-count" id="count"></div>
      <div id="list"></div>
    </main>

    <footer>
      <p>
        엑셀 단축키 모음 · Windows 기준 · 카드를 클릭하면 사용법을 볼 수 있어요
      </p>
    </footer>

    <!-- 모달 -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <div class="modal-header">
          <div class="modal-title" id="modal-title"></div>
          <button class="modal-close" id="modal-close">×</button>
        </div>
        <div class="modal-keys" id="modal-keys"></div>
        <div class="modal-body" id="modal-body"></div>
      </div>
    </div>

    <script>
      const ALL = [
        {
          cat: "탐색",
          desc: "셀 이동",
          tip: "방향키로 한 칸씩 이동",
          keys: [["↑↓←→"]],
          jobs: ["전체", "일반", "회계", "인사", "데이터분석", "기획"],
          when: "엑셀에서 가장 기본적인 이동이에요. 마우스 없이 키보드만으로 셀을 이동할 때 사용해요.",
          steps: [
            "이동하고 싶은 방향의 화살표 키를 눌러요",
            "한 번 누를 때마다 한 칸씩 이동해요",
          ],
          example:
            "A1에서 오른쪽 화살표를 누르면 B1로, 아래 화살표를 누르면 A2로 이동해요.",
        },
        {
          cat: "탐색",
          desc: "데이터 끝으로 이동",
          tip: "빈 셀 전까지 한 번에",
          keys: [["Ctrl"], ["↑↓←→"]],
          jobs: ["전체", "일반", "회계", "인사", "데이터분석", "기획"],
          when: "수백 행의 데이터에서 마지막 행으로 한 번에 이동하고 싶을 때 써요. 스크롤 대신 이걸 쓰면 엄청 빨라요.",
          steps: [
            "이동하고 싶은 방향을 정해요",
            "Ctrl을 누른 채 방향키를 눌러요",
            "데이터가 끊기는 마지막 셀로 이동해요",
          ],
          example:
            "A1에서 Ctrl+↓ 누르면 A열 데이터의 가장 마지막 행으로 순식간에 이동해요.",
        },
        {
          cat: "탐색",
          desc: "시트 처음(A1)으로",
          tip: "",
          keys: [["Ctrl"], ["Home"]],
          jobs: ["전체", "일반", "회계", "데이터분석"],
          when: "스크롤을 많이 내렸을 때 다시 처음으로 돌아가고 싶을 때 써요.",
          steps: ["Ctrl + Home을 동시에 눌러요", "바로 A1 셀로 이동해요"],
          example:
            "데이터 1000번째 행에 있다가 Ctrl+Home 누르면 바로 A1로 돌아와요.",
        },
        {
          cat: "탐색",
          desc: "시트 끝으로",
          tip: "데이터 마지막 셀",
          keys: [["Ctrl"], ["End"]],
          jobs: ["전체", "일반", "데이터분석"],
          when: "데이터가 어디까지 있는지 확인하거나 마지막 행에 새 데이터를 추가할 때 써요.",
          steps: [
            "Ctrl + End를 동시에 눌러요",
            "데이터가 있는 가장 마지막 셀로 이동해요",
          ],
          example:
            "A1:F500에 데이터가 있으면 Ctrl+End 누를 때 F500으로 이동해요.",
        },
        {
          cat: "탐색",
          desc: "다음 시트로",
          tip: "",
          keys: [["Ctrl"], ["Page↓"]],
          jobs: ["전체", "일반", "회계", "인사"],
          when: "여러 시트로 구성된 파일에서 시트 간 이동할 때 써요. 탭을 마우스로 클릭하는 것보다 빠르고 편해요.",
          steps: [
            "Ctrl + Page Down을 동시에 눌러요",
            "오른쪽 다음 시트로 이동해요",
          ],
          example:
            "1월~12월 시트가 있을 때 Ctrl+Page↓ 누르면 1월→2월→3월 순으로 이동해요.",
        },
        {
          cat: "탐색",
          desc: "이전 시트로",
          tip: "",

        const q = query.trim().toLowerCase();

          const catOk = activeCat === "전체" || s.cat === activeCat;

            !q ||
            s.desc.toLowerCase().includes(q) ||
            s.tip.toLowerCase().includes(q) ||
            s.keys.flat().join("").toLowerCase().includes(q) ||
            s.cat.toLowerCase().includes(q);
          return jobOk && catOk && qOk;
        });

      function renderKeys(keys) {
        return keys
          .map(
            (k, i) =>
              `${i > 0 ? '<span class="plus">+</span>' : ""}<span class="key">${k[0]}</span>`,
          )
          .join("");

          btn.addEventListener("click", () => {
            activeJob = btn.dataset.job;
            activeCat = "전체";
            renderJobTabs();
            renderCats();
            render();
          });
        });
        document.getElementById("job-desc").textContent =
          JOBS.find((j) => j.id === activeJob)?.desc || "";

            ALL.filter((s) => s.jobs.includes(activeJob)).map((s) => s.cat),

          .map(

          )
          .join("");

            activeCat = btn.dataset.cat;
            renderCats();
            render();
          });

        } catch (e) {
          aiAnswer.textContent =
            "오류가 발생했어요. 잠시 후 다시 시도해주세요.";
        }
        aiAsk.disabled = false;
      }
      aiAsk.addEventListener("click", askAI);
      aiQuery.addEventListener("keydown", (e) => {
        if (e.key === "Enter") askAI();
      });

      renderJobTabs();
      renderCats();
      render();
    </script>
  </body>
</html>
