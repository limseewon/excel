<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>엑셀 단축키 모음</title>
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #ffffff;
        --border: #e5e5e2;
        --border-hover: #d0d0cb;
        --text: #1a1a18;
        --text-muted: #888884;
        --text-hint: #b0b0aa;
        --accent: #3c3489;
        --accent-light: #eeedfe;
        --accent-text: #26215c;
        --key-bg: #f0f0ed;
        --key-border: #d8d8d4;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 1.5rem;
        height: 60px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 16px;
        color: var(--accent);
        white-space: nowrap;
        text-decoration: none;
      }

      .logo svg {
        width: 22px;
        height: 22px;
      }

      .search-wrap {
        flex: 1;
        max-width: 480px;
        position: relative;
      }

      .search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-hint);
        pointer-events: none;
      }

      #search {
        width: 100%;
        padding: 9px 12px 9px 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }

      #search:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      #search::placeholder {
        color: var(--text-hint);
      }

      .ai-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        transition: opacity 0.15s;
      }

      .ai-btn:hover {
        opacity: 0.88;
      }
      .ai-btn svg {
        width: 15px;
        height: 15px;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem;
      }

      .cats {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.75rem;
      }

      .cat-btn {
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }

      .cat-btn:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .cat-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }

      .section {
        margin-bottom: 2rem;
      }

      .section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-hint);
        margin-bottom: 0.75rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 10px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }

      .card:hover {
        border-color: var(--border-hover);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }

      .card-left {
        flex: 1;
        min-width: 0;
      }

      .card-desc {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 4px;
      }

      .card-tip {
        font-size: 12px;
        color: var(--text-hint);
      }

      .keys {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
      }

      .key {
        display: inline-flex;
        align-items: center;
        padding: 4px 9px;
        background: var(--key-bg);
        border: 1px solid var(--key-border);
        border-bottom-width: 2px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--text);
        white-space: nowrap;
      }

      .plus {
        font-size: 11px;
        color: var(--text-hint);
        font-weight: 500;
      }

      .badge {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 500;
        margin-left: 6px;
      }

      .empty {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-hint);
        font-size: 14px;
      }

      .empty p:first-child {
        font-size: 18px;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
      }

      .result-count {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 1.25rem;
      }

      /* AI 패널 */
      .ai-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 1.75rem;
        overflow: hidden;
        display: none;
      }

      .ai-panel.open {
        display: block;
      }

      .ai-panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--accent-light);
      }

      .ai-panel-header span {
        font-size: 14px;
        font-weight: 500;
        color: var(--accent-text);
        flex: 1;
      }

      .ai-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 18px;
        line-height: 1;
        padding: 0;
        font-family: inherit;
      }

      .ai-input-row {
        display: flex;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      #ai-query {
        flex: 1;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        background: var(--bg);
      }

      #ai-query:focus {
        border-color: var(--accent);
        background: var(--surface);
      }

      .ai-ask-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: opacity 0.15s;
      }

      .ai-ask-btn:hover {
        opacity: 0.88;
      }
      .ai-ask-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .ai-answer {
        padding: 16px;
        font-size: 14px;
        line-height: 1.7;
        color: var(--text);
        min-height: 60px;
        white-space: pre-wrap;
      }

      .ai-answer.loading {
        color: var(--text-hint);
        font-style: italic;
      }

      .typing-dots span {
        display: inline-block;
        animation: blink 1.2s infinite;
        font-size: 18px;
        line-height: 1;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      @media (max-width: 640px) {
        header {
          padding: 0 1rem;
        }
        main {
          padding: 1.25rem 1rem;
        }
        .header-inner {
          gap: 0.75rem;
        }
        .logo span {
          display: none;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="#">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
          <span>엑셀 단축키</span>
        </a>
        <div class="search-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            id="search"
            type="text"
            placeholder="단축키 검색... (예: 복사, 저장, 합계)" />
        </div>
        <button class="ai-btn" id="ai-toggle-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <path
              d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z" />
          </svg>
          AI 검색
        </button>
      </div>
    </header>

    <main>
      <!-- AI 패널 -->
      <div class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#3C3489"
            stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4M12 8h.01" />
          </svg>
          <span>뭘 하고 싶은지 말해주세요 — 단축키를 찾아드릴게요</span>
          <button class="ai-close" id="ai-close">×</button>
        </div>
        <div class="ai-input-row">
          <input
            id="ai-query"
            type="text"
            placeholder="예: 여러 셀을 한 번에 합치고 싶어요" />
          <button class="ai-ask-btn" id="ai-ask">물어보기</button>
        </div>
        <div class="ai-answer" id="ai-answer"></div>
      </div>

      <div class="cats" id="cats"></div>
      <div class="result-count" id="count"></div>
      <div id="list"></div>
    </main>

    <script>
      const SHORTCUTS = [
        // 탐색
        {
          cat: "탐색",
          desc: "셀 이동",
          tip: "방향키로 한 칸씩 이동",
          keys: [["↑↓←→"]],
        },
        {
          cat: "탐색",
          desc: "데이터 끝으로 이동",
          tip: "빈 셀 전까지 이동",
          keys: [["Ctrl"], ["↑↓←→"]],
        },
        {
          cat: "탐색",
          desc: "시트 처음(A1)으로",
          tip: "",
          keys: [["Ctrl"], ["Home"]],
        },
        {
          cat: "탐색",
          desc: "시트 끝으로",
          tip: "",
          keys: [["Ctrl"], ["End"]],
        },
        {
          cat: "탐색",
          desc: "다음 시트로",
          tip: "",
          keys: [["Ctrl"], ["Page↓"]],
        },
        {
          cat: "탐색",
          desc: "이전 시트로",
          tip: "",
          keys: [["Ctrl"], ["Page↑"]],
        },
        {
          cat: "탐색",
          desc: "특정 셀로 이동",
          tip: "셀 주소 직접 입력",
          keys: [["Ctrl"], ["G"]],
        },
        {
          cat: "탐색",
          desc: "이름 상자로 이동",
          tip: "F5 대신 빠른 이동",
          keys: [["F5"]],
        },
        // 선택
        {
          cat: "선택",
          desc: "연속 범위 선택",
          tip: "방향키와 함께 드래그 효과",
          keys: [["Shift"], ["↑↓←→"]],
        },
        {
          cat: "선택",
          desc: "데이터 끝까지 선택",
          tip: "",
          keys: [["Ctrl"], ["Shift"], ["↑↓←→"]],
        },
        {
          cat: "선택",
          desc: "행 전체 선택",
          tip: "",
          keys: [["Shift"], ["Space"]],
        },
        {
          cat: "선택",
          desc: "열 전체 선택",
          tip: "",
          keys: [["Ctrl"], ["Space"]],
        },
        {
          cat: "선택",
          desc: "시트 전체 선택",
          tip: "",
          keys: [["Ctrl"], ["A"]],
        },
        {
          cat: "선택",
          desc: "비연속 셀 추가 선택",
          tip: "Ctrl 누른 채 클릭",
          keys: [["Ctrl"], ["클릭"]],
        },
        // 편집
        { cat: "편집", desc: "복사", tip: "", keys: [["Ctrl"], ["C"]] },
        { cat: "편집", desc: "잘라내기", tip: "", keys: [["Ctrl"], ["X"]] },
        { cat: "편집", desc: "붙여넣기", tip: "", keys: [["Ctrl"], ["V"]] },
        {
          cat: "편집",
          desc: "선택하여 붙여넣기",
          tip: "값만, 서식만 등 선택 가능",
          keys: [["Ctrl"], ["Alt"], ["V"]],
        },
        { cat: "편집", desc: "실행 취소", tip: "", keys: [["Ctrl"], ["Z"]] },
        { cat: "편집", desc: "다시 실행", tip: "", keys: [["Ctrl"], ["Y"]] },
        { cat: "편집", desc: "셀 내용 삭제", tip: "", keys: [["Delete"]] },
        {
          cat: "편집",
          desc: "셀 편집 모드",
          tip: "커서를 셀 안으로",
          keys: [["F2"]],
        },
        {
          cat: "편집",
          desc: "행 삽입",
          tip: "선택한 행 위에 삽입",
          keys: [["Ctrl"], ["+"]],
        },
        { cat: "편집", desc: "행/열 삭제", tip: "", keys: [["Ctrl"], ["-"]] },
        {
          cat: "편집",
          desc: "현재 날짜 입력",
          tip: "오늘 날짜 바로 입력",
          keys: [["Ctrl"], [";"]],
        },
        {
          cat: "편집",
          desc: "현재 시간 입력",
          tip: "지금 시각 바로 입력",
          keys: [["Ctrl"], ["Shift"], [";"]],
        },
        {
          cat: "편집",
          desc: "위 셀 내용 복사",
          tip: "",
          keys: [["Ctrl"], ["D"]],
        },
        {
          cat: "편집",
          desc: "왼쪽 셀 내용 복사",
          tip: "",
          keys: [["Ctrl"], ["R"]],
        },
        { cat: "편집", desc: "찾기", tip: "", keys: [["Ctrl"], ["F"]] },
        { cat: "편집", desc: "바꾸기", tip: "", keys: [["Ctrl"], ["H"]] },
        // 서식
        { cat: "서식", desc: "굵게", tip: "", keys: [["Ctrl"], ["B"]] },
        { cat: "서식", desc: "기울임", tip: "", keys: [["Ctrl"], ["I"]] },
        { cat: "서식", desc: "밑줄", tip: "", keys: [["Ctrl"], ["U"]] },
        { cat: "서식", desc: "취소선", tip: "", keys: [["Ctrl"], ["5"]] },
        {
          cat: "서식",
          desc: "셀 서식 열기",
          tip: "숫자, 정렬, 테두리 등 모두",
          keys: [["Ctrl"], ["1"]],
        },
        {
          cat: "서식",
          desc: "열 너비 자동 맞춤",
          tip: "내용에 딱 맞게",
          keys: [["Alt"], ["H"], ["O"], ["I"]],
        },
        {
          cat: "서식",
          desc: "행 높이 자동 맞춤",
          tip: "",
          keys: [["Alt"], ["H"], ["O"], ["A"]],
        },
        {
          cat: "서식",
          desc: "테두리 추가",
          tip: "",
          keys: [["Ctrl"], ["Shift"], ["7"]],
        },
        {
          cat: "서식",
          desc: "테두리 제거",
          tip: "",
          keys: [["Ctrl"], ["Shift"], ["-"]],
        },
        {
          cat: "서식",
          desc: "숫자 천단위 쉼표",
          tip: "",
          keys: [["Ctrl"], ["Shift"], ["1"]],
        },
        {
          cat: "서식",
          desc: "퍼센트 형식",
          tip: "",
          keys: [["Ctrl"], ["Shift"], ["5"]],
        },
        // 수식
        {
          cat: "수식",
          desc: "합계 자동 입력",
          tip: "범위 자동 감지",
          keys: [["Alt"], ["="]],
        },
        {
          cat: "수식",
          desc: "절대/상대 참조 전환",
          tip: "$A$1 ↔ A1 전환",
          keys: [["F4"]],
        },
        {
          cat: "수식",
          desc: "함수 마법사",
          tip: "함수 검색 및 입력 도우미",
          keys: [["Shift"], ["F3"]],
        },
        {
          cat: "수식",
          desc: "이름 정의",
          tip: "범위에 이름 붙이기",
          keys: [["Ctrl"], ["F3"]],
        },
        {
          cat: "수식",
          desc: "수식 표시 토글",
          tip: "수식/결과값 전환",
          keys: [["Ctrl"], ["`"]],
        },
        {
          cat: "수식",
          desc: "배열 수식 입력",
          tip: "Ctrl+Shift+Enter",
          keys: [["Ctrl"], ["Shift"], ["Enter"]],
        },
        // 시트/파일
        { cat: "시트·파일", desc: "저장", tip: "", keys: [["Ctrl"], ["S"]] },
        {
          cat: "시트·파일",
          desc: "다른 이름으로 저장",
          tip: "",
          keys: [["F12"]],
        },
        { cat: "시트·파일", desc: "새 파일", tip: "", keys: [["Ctrl"], ["N"]] },
        {
          cat: "시트·파일",
          desc: "파일 열기",
          tip: "",
          keys: [["Ctrl"], ["O"]],
        },
        { cat: "시트·파일", desc: "인쇄", tip: "", keys: [["Ctrl"], ["P"]] },
        {
          cat: "시트·파일",
          desc: "새 시트 삽입",
          tip: "",
          keys: [["Alt"], ["Shift"], ["F1"]],
        },
        {
          cat: "시트·파일",
          desc: "시트 이름 변경",
          tip: "탭 더블클릭과 동일",
          keys: [["Alt"], ["H"], ["O"], ["R"]],
        },
        { cat: "시트·파일", desc: "창 닫기", tip: "", keys: [["Ctrl"], ["W"]] },
      ];

      const CATS = ["전체", ...new Set(SHORTCUTS.map((s) => s.cat))];
      let activeCat = "전체";
      let query = "";

      function renderKeys(keys) {
        return keys
          .map(
            (k, i) =>
              `${i > 0 ? '<span class="plus">+</span>' : ""}<span class="key">${k[0]}</span>`,
          )
          .join("");
      }

      function filtered() {
        const q = query.trim().toLowerCase();
        return SHORTCUTS.filter((s) => {
          const catOk = activeCat === "전체" || s.cat === activeCat;
          const qOk =
            !q ||
            s.desc.toLowerCase().includes(q) ||
            s.tip.toLowerCase().includes(q) ||
            s.keys.flat().join("").toLowerCase().includes(q) ||
            s.cat.toLowerCase().includes(q);
          return catOk && qOk;
        });
      }

      function render() {
        const data = filtered();
        document.getElementById("count").textContent = `총 ${data.length}개`;
        const grouped = {};
        data.forEach((s) => {
          if (!grouped[s.cat]) grouped[s.cat] = [];
          grouped[s.cat].push(s);
        });
        const list = document.getElementById("list");
        if (!data.length) {
          list.innerHTML = `<div class="empty"><p>검색 결과 없음</p><p>"${query}"에 맞는 단축키를 찾지 못했어요. AI 검색을 써보세요!</p></div>`;
          return;
        }
        list.innerHTML = Object.entries(grouped)
          .map(
            ([cat, items]) => `
    <div class="section">
      <div class="section-label">${cat}</div>
      <div class="grid">
        ${items
          .map(
            (s) => `
          <div class="card">
            <div class="card-left">
              <div class="card-desc">${s.desc}</div>
              ${s.tip ? `<div class="card-tip">${s.tip}</div>` : ""}
            </div>
            <div class="keys">${renderKeys(s.keys)}</div>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
  `,
          )
          .join("");
      }

      function renderCats() {
        const el = document.getElementById("cats");
        el.innerHTML = CATS.map(
          (c) =>
            `<button class="cat-btn${c === activeCat ? " active" : ""}" data-cat="${c}">${c}</button>`,
        ).join("");
        el.querySelectorAll(".cat-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeCat = btn.dataset.cat;
            renderCats();
            render();
          });
        });
      }

      document.getElementById("search").addEventListener("input", (e) => {
        query = e.target.value;
        render();
      });

      // AI 패널
      const aiPanel = document.getElementById("ai-panel");
      const aiAnswer = document.getElementById("ai-answer");
      const aiQuery = document.getElementById("ai-query");
      const aiAsk = document.getElementById("ai-ask");

      document.getElementById("ai-toggle-btn").addEventListener("click", () => {
        aiPanel.classList.toggle("open");
        if (aiPanel.classList.contains("open")) aiQuery.focus();
      });

      document.getElementById("ai-close").addEventListener("click", () => {
        aiPanel.classList.remove("open");
      });

      async function askAI() {
        const q = aiQuery.value.trim();
        if (!q) return;
        aiAsk.disabled = true;
        aiAnswer.className = "ai-answer loading";
        aiAnswer.innerHTML =
          '<div class="typing-dots"><span>•</span><span>•</span><span>•</span></div>';

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 1000,
              system: `당신은 엑셀 단축키 전문가입니다. 사용자가 하고 싶은 작업을 말하면, 관련 엑셀 단축키를 알려주세요.
답변 형식:
- 핵심 단축키를 먼저 굵게 강조해서 알려주세요 (예: **Ctrl + C**)
- 단축키 사용법을 1-2줄로 간단히 설명
- 연관된 단축키가 있으면 추가로 소개
- 친근하고 간결하게 한국어로 답변
- 없는 기능이면 솔직하게 알려주세요`,
              messages: [{ role: "user", content: q }],
            }),
          });
          const data = await res.json();
          const text = data.content?.[0]?.text || "답변을 가져오지 못했어요.";
          aiAnswer.className = "ai-answer";
          aiAnswer.innerHTML = text
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");
        } catch (e) {
          aiAnswer.className = "ai-answer";
          aiAnswer.textContent =
            "오류가 발생했어요. 잠시 후 다시 시도해주세요.";
        }
        aiAsk.disabled = false;
      }

      aiAsk.addEventListener("click", askAI);
      aiQuery.addEventListener("keydown", (e) => {
        if (e.key === "Enter") askAI();
      });

      renderCats();
      render();
    </script>
  </body>
</html>
