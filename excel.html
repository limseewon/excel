<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="keywords"
      content="엑셀 단축키, excel 단축키, 엑셀 단축키 모음, 엑셀 빠른 키, 엑셀 팁, 회계 엑셀, 인사 엑셀" />
    <meta name="author" content="Excel Shortcut" />
    <meta property="og:title" content="엑셀 단축키 모음 | 업무별 완벽 정리" />
    <meta
      property="og:description"
      content="회계, 인사, 데이터분석 등 업무별 엑셀 단축키를 한눈에. AI 검색으로 원하는 단축키를 바로 찾아보세요." />
    <meta property="og:type" content="website" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://limseewon.github.io/excel/" />
    <style>
      :root {
        --bg: #f7f7f5;
        --surface: #ffffff;
        --border: #e5e5e2;
        --border-hover: #d0d0cb;
        --text: #1a1a18;
        --text-muted: #888884;
        --text-hint: #b0b0aa;
        --accent: #3c3489;
        --accent-light: #eeedfe;
        --accent-text: #26215c;
        --key-bg: #f0f0ed;
        --key-border: #d8d8d4;
        --radius-sm: 6px;
        --radius-md: 10px;
        --radius-lg: 14px;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        font-size: 15px;
        line-height: 1.6;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-inner {
        max-width: 1100px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        gap: 1rem;
        height: 60px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 16px;
        color: var(--accent);
        white-space: nowrap;
        text-decoration: none;
      }
      .logo svg {
        width: 22px;
        height: 22px;
      }
      .search-wrap {
        flex: 1;
        max-width: 440px;
        position: relative;
      }
      .search-wrap svg {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--text-hint);
        pointer-events: none;
      }
      #search {
        width: 100%;
        padding: 9px 12px 9px 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      #search:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      #search::placeholder {
        color: var(--text-hint);
      }
      .ai-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      .ai-btn:hover {
        opacity: 0.88;
      }
      .ai-btn svg {
        width: 15px;
        height: 15px;
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem;
      }

      /* 업무 탭 */
      .job-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.25rem;
        padding-bottom: 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .job-tab {
        padding: 7px 18px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .job-tab:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .job-tab.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .job-desc {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 1.25rem;
      }

      /* 카테고리 필터 */
      .cats {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      .cat-btn {
        padding: 5px 14px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-muted);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.15s;
        font-family: inherit;
      }
      .cat-btn:hover {
        border-color: var(--border-hover);
        color: var(--text);
      }
      .cat-btn.active {
        background: var(--accent-light);
        color: var(--accent-text);
        border-color: var(--accent);
      }

      .result-count {
        font-size: 13px;
        color: var(--text-hint);
        margin-bottom: 1rem;
      }
      .section {
        margin-bottom: 2rem;
      }
      .section-label {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-hint);
        margin-bottom: 0.75rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 10px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        transition: border-color 0.15s;
      }
      .card:hover {
        border-color: var(--border-hover);
      }
      .card-left {
        flex: 1;
        min-width: 0;
      }
      .card-desc {
        font-size: 14px;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 3px;
      }
      .card-tip {
        font-size: 12px;
        color: var(--text-hint);
      }
      .keys {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .key {
        display: inline-flex;
        align-items: center;
        padding: 4px 9px;
        background: var(--key-bg);
        border: 1px solid var(--key-border);
        border-bottom-width: 2px;
        border-radius: var(--radius-sm);
        font-size: 12px;
        font-family: "SF Mono", "Fira Code", monospace;
        color: var(--text);
        white-space: nowrap;
      }
      .plus {
        font-size: 11px;
        color: var(--text-hint);
      }
      .empty {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--text-hint);
        font-size: 14px;
      }
      .empty p:first-child {
        font-size: 18px;
        margin-bottom: 0.5rem;
        color: var(--text-muted);
      }

      /* AI 패널 */
      .ai-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        margin-bottom: 1.75rem;
        overflow: hidden;
        display: none;
      }
      .ai-panel.open {
        display: block;
      }
      .ai-panel-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--accent-light);
      }
      .ai-panel-header span {
        font-size: 14px;
        font-weight: 500;
        color: var(--accent-text);
        flex: 1;
      }
      .ai-close {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 20px;
        line-height: 1;
        padding: 0;
        font-family: inherit;
      }
      .ai-input-row {
        display: flex;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }
      #ai-query {
        flex: 1;
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-size: 14px;
        font-family: inherit;
        color: var(--text);
        outline: none;
        background: var(--bg);
      }
      #ai-query:focus {
        border-color: var(--accent);
        background: var(--surface);
      }
      .ai-ask-btn {
        padding: 9px 16px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: var(--radius-md);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        white-space: nowrap;
        transition: opacity 0.15s;
      }
      .ai-ask-btn:hover {
        opacity: 0.88;
      }
      .ai-ask-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .ai-answer {
        padding: 16px;
        font-size: 14px;
        line-height: 1.8;
        color: var(--text);
        min-height: 60px;
        white-space: pre-wrap;
      }
      .typing-dots span {
        display: inline-block;
        animation: blink 1.2s infinite;
        font-size: 20px;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.2;
        }
        40% {
          opacity: 1;
        }
      }

      footer {
        text-align: center;
        padding: 2rem;
        font-size: 13px;
        color: var(--text-hint);
        border-top: 1px solid var(--border);
        margin-top: 2rem;
      }

      @media (max-width: 640px) {
        header {
          padding: 0 1rem;
        }
        main {
          padding: 1.25rem 1rem;
        }
        .logo span {
          display: none;
        }
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="#">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M3 9h18M9 21V9" />
          </svg>
          <span>엑셀 단축키</span>
        </a>
        <div class="search-wrap">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            id="search"
            type="text"
            placeholder="단축키 검색... (예: 복사, 저장, 합계)" />
        </div>
        <button class="ai-btn" id="ai-toggle-btn">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2">
            <path
              d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
          AI 검색
        </button>
      </div>
    </header>

    <main>
      <div class="ai-panel" id="ai-panel">
        <div class="ai-panel-header">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="#3C3489"
            stroke-width="2">
            <path
              d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
          <span>하고 싶은 작업을 말해주세요 — 단축키를 찾아드릴게요</span>
          <button class="ai-close" id="ai-close">×</button>
        </div>
        <div class="ai-input-row">
          <input
            id="ai-query"
            type="text"
            placeholder="예: 여러 셀 내용을 한 줄로 합치고 싶어요" />
          <button class="ai-ask-btn" id="ai-ask">찾아보기</button>
        </div>
        <div class="ai-answer" id="ai-answer"></div>
      </div>

      <div class="job-tabs" id="job-tabs"></div>
      <div class="job-desc" id="job-desc"></div>
      <div class="cats" id="cats"></div>
      <div class="result-count" id="count"></div>
      <div id="list"></div>
    </main>

    <footer>
      <p>
        엑셀 단축키 모음 · Windows 기준 · 더 좋은 단축키가 있으면 알려주세요
      </p>
    </footer>

    <script>
      const ALL = [
        // 탐색
        {
          cat: "탐색",
          desc: "셀 이동",
          tip: "방향키로 한 칸씩 이동",

        {

        {

        {

        },
        {
          cat: "선택",

          jobs: ["전체", "일반", "데이터분석"],
        },
        {
          cat: "선택",
          desc: "시트 전체 선택",

          keys: [["Ctrl"], ["A"]],

        {

      const JOBS = [
        { id: "전체", label: "전체", desc: "모든 단축키 목록이에요." },
        {
          id: "일반",
          label: "일반 업무",
          desc: "문서 작성, 데이터 입력 등 일상 업무에서 자주 쓰는 단축키예요.",
        },
        {
          id: "회계",
          label: "회계·재무",
          desc: "숫자 서식, 합계, 통화 표시 등 회계 업무에 유용한 단축키예요.",
        },
        {
          id: "인사",
          label: "인사·총무",
          desc: "명단 관리, 날짜 입력, 필터 등 인사 업무에 자주 쓰는 단축키예요.",
        },
        {
          id: "데이터분석",
          label: "데이터 분석",
          desc: "필터, 정렬, 피벗, 수식 등 데이터 분석에 필수 단축키예요.",
        },
        {
          id: "기획",
          label: "기획·보고서",
          desc: "서식, 인쇄, 문서 정리 등 보고서 작성에 유용한 단축키예요.",
        },
      ];

      let activeJob = "전체";
      let activeCat = "전체";
      let query = "";

      function getFiltered() {
        const q = query.trim().toLowerCase();
        return ALL.filter((s) => {
          const jobOk = s.jobs.includes(activeJob);
          const catOk = activeCat === "전체" || s.cat === activeCat;
          const qOk =
            !q ||
            s.desc.toLowerCase().includes(q) ||
            s.tip.toLowerCase().includes(q) ||
            s.keys.flat().join("").toLowerCase().includes(q) ||
            s.cat.toLowerCase().includes(q);
          return jobOk && catOk && qOk;
        });
      }

      function renderKeys(keys) {
        return keys
          .map(
            (k, i) =>
              `${i > 0 ? '<span class="plus">+</span>' : ""}<span class="key">${k[0]}</span>`,
          )
          .join("");
      }

      function renderJobTabs() {
        const el = document.getElementById("job-tabs");
        el.innerHTML = JOBS.map(
          (j) =>
            `<button class="job-tab${j.id === activeJob ? " active" : ""}" data-job="${j.id}">${j.label}</button>`,
        ).join("");
        el.querySelectorAll(".job-tab").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeJob = btn.dataset.job;
            activeCat = "전체";
            renderJobTabs();
            renderCats();
            render();
          });
        });
        document.getElementById("job-desc").textContent =
          JOBS.find((j) => j.id === activeJob)?.desc || "";
      }

      function renderCats() {
        const jobData = ALL.filter((s) => s.jobs.includes(activeJob));
        const cats = ["전체", ...new Set(jobData.map((s) => s.cat))];
        const el = document.getElementById("cats");
        el.innerHTML = cats
          .map(
            (c) =>
              `<button class="cat-btn${c === activeCat ? " active" : ""}" data-cat="${c}">${c}</button>`,
          )
          .join("");
        el.querySelectorAll(".cat-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            activeCat = btn.dataset.cat;
            renderCats();
            render();
          });
        });
      }

      function render() {
        const data = getFiltered();
        document.getElementById("count").textContent = `총 ${data.length}개`;
        const grouped = {};
        data.forEach((s) => {
          if (!grouped[s.cat]) grouped[s.cat] = [];
          grouped[s.cat].push(s);
        });
        const list = document.getElementById("list");
        if (!data.length) {
          list.innerHTML = `<div class="empty"><p>검색 결과 없음</p><p>"${query}"에 맞는 단축키를 찾지 못했어요. AI 검색을 써보세요!</p></div>`;
          return;
        }
        list.innerHTML = Object.entries(grouped)
          .map(
            ([cat, items]) => `
    <div class="section">
      <div class="section-label">${cat}</div>
      <div class="grid">
        ${items
          .map(
            (s) => `
          <div class="card">
            <div class="card-left">
              <div class="card-desc">${s.desc}</div>
              ${s.tip ? `<div class="card-tip">${s.tip}</div>` : ""}
            </div>
            <div class="keys">${renderKeys(s.keys)}</div>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
  `,
          )
          .join("");
      }

      document.getElementById("search").addEventListener("input", (e) => {
        query = e.target.value;
        render();
      });

      // AI 패널
      const aiPanel = document.getElementById("ai-panel");
      const aiAnswer = document.getElementById("ai-answer");
      const aiQuery = document.getElementById("ai-query");
      const aiAsk = document.getElementById("ai-ask");

      document.getElementById("ai-toggle-btn").addEventListener("click", () => {
        aiPanel.classList.toggle("open");
        if (aiPanel.classList.contains("open")) aiQuery.focus();
      });
      document.getElementById("ai-close").addEventListener("click", () => {
        aiPanel.classList.remove("open");
      });

      async function askAI() {
        const q = aiQuery.value.trim();
        if (!q) return;
        aiAsk.disabled = true;
        aiAnswer.innerHTML =
          '<div class="typing-dots"><span>•</span><span>•</span><span>•</span></div>';
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 1000,
              system: `당신은 엑셀 단축키 전문가입니다. 사용자가 하고 싶은 작업을 말하면 관련 엑셀 단축키를 알려주세요.
- 핵심 단축키를 **Ctrl + C** 형식으로 강조
- 사용법을 1~2줄로 간결하게 설명
- 연관 단축키가 있으면 추가 소개
- 친근하고 간결한 한국어로 답변
- Windows 기준으로 답변`,
              messages: [{ role: "user", content: q }],
            }),
          });
          const data = await res.json();
          const text = data.content?.[0]?.text || "답변을 가져오지 못했어요.";
          aiAnswer.innerHTML = text
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");
        } catch (e) {
          aiAnswer.textContent =
            "오류가 발생했어요. 잠시 후 다시 시도해주세요.";
        }
        aiAsk.disabled = false;
      }

      aiAsk.addEventListener("click", askAI);
      aiQuery.addEventListener("keydown", (e) => {
        if (e.key === "Enter") askAI();
      });

      renderJobTabs();
      renderCats();
      render();
